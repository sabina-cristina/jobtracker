<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker Dashboard</title>
    <!-- Importăm Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            padding-top: 40px;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .stat-card {
            cursor: pointer;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            background-color: #f8f9fa;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
        <div>
            <h1 class="display-5 fw-bold text-primary">🚀 Job Tracker Dashboard</h1>
            <p class="text-muted mb-0">Aplicația ta personală pentru gestionarea interviurilor</p>
        </div>
        <!-- Butoanele de acțiune rapidă -->
        <div>
            <button class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#addCompanyModal">➕ Adaugă Companie</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addJobModal" onclick="populateCompanyDropdown()">💼 Adaugă Job</button>
            <!-- Butonul nou de Logout -->
            <a href="/api/auth/logout" class="btn btn-danger">🚪 Ieșire</a>
        </div>
    </header>

    <!-- Secțiunea de Statistici -->
    <h3 class="mb-3">Statistici Aplicări</h3>
    <div class="row mb-5" id="stats-container">
        <!-- Datele vor fi introduse aici automat din JavaScript -->
    </div>

    <!-- Secțiunea de Companii -->
    <h3 class="mb-3">Companii Salvate</h3>
    <div class="row" id="companies-container">
        <!-- Companiile vor fi introduse aici automat din JavaScript -->
    </div>
</div>

<!-- ================= MODALE INTERFEȚEI ================= -->

<!-- 1. Modal Detalii Joburi -->
<div class="modal fade" id="jobsModal" tabindex="-1" aria-labelledby="jobsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="jobsModalLabel">Detalii Joburi</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="jobsModalBody">
                <div class="text-center">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 2. Modal Adăugare Companie -->
<div class="modal fade" id="addCompanyModal" tabindex="-1" aria-labelledby="addCompanyModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-success" id="addCompanyModalLabel">Adaugă Companie Nouă</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addCompanyForm">
                    <div class="mb-3">
                        <label for="companyName" class="form-label">Nume Companie</label>
                        <input type="text" class="form-control" id="companyName" required placeholder="Ex: Google">
                    </div>
                    <div class="mb-3">
                        <label for="companyLocation" class="form-label">Locație</label>
                        <input type="text" class="form-control" id="companyLocation" required placeholder="Ex: București, Remote">
                    </div>
                    <div class="mb-3">
                        <label for="companyWebsite" class="form-label">Website Oficial</label>
                        <input type="url" class="form-control" id="companyWebsite" required placeholder="Ex: https://google.com">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Salvează Compania</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 3. Modal Adăugare Job -->
<div class="modal fade" id="addJobModal" tabindex="-1" aria-labelledby="addJobModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-primary" id="addJobModalLabel">Adaugă Aplicare Nouă</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addJobForm">
                    <div class="mb-3">
                        <label for="jobTitle" class="form-label">Titlu Job</label>
                        <input type="text" class="form-control" id="jobTitle" required placeholder="Ex: Junior Java Developer">
                    </div>
                    <div class="mb-3">
                        <label for="jobStatus" class="form-label">Status Aplicare</label>
                        <select class="form-select" id="jobStatus" required>
                            <option value="SAVED">SAVED (Salvat pentru mai târziu)</option>
                            <option value="APPLIED" selected>APPLIED (CV Trimis)</option>
                            <option value="INTERVIEW">INTERVIEW (În faza de interviuri)</option>
                            <option value="OFFER">OFFER (Ofertă primită)</option>
                            <option value="REJECTED">REJECTED (Refuzat)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="jobUrl" class="form-label">Link Descriere Job (Opțional)</label>
                        <input type="url" class="form-control" id="jobUrl" placeholder="Ex: https://linkedin.com/jobs/...">
                    </div>
                    <div class="mb-3">
                        <label for="jobCompanySelect" class="form-label">Alege Compania</label>
                        <select class="form-select" id="jobCompanySelect" required>
                            <!-- Opțiunile se vor încărca dinamic din baza de date -->
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Adaugă Jobul</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Importăm Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Reîncărcare generală a datelor de pe ecran
    function loadDashboardData() {
        document.getElementById('stats-container').innerHTML = '';
        document.getElementById('companies-container').innerHTML = '';

        // 1. Luăm Statisticile
        fetch('/api/jobs/statistics')
            .then(response => response.json())
            .then(data => {
                const statsContainer = document.getElementById('stats-container');
                if (Object.keys(data).length === 0) {
                    statsContainer.innerHTML = '<p class="text-muted">Nu ai adăugat încă niciun job pentru a vedea statistici.</p>';
                    return;
                }
                for (const [status, count] of Object.entries(data)) {
                    statsContainer.innerHTML += `
                        <div class="col-md-3 mb-3">
                            <div class="card p-4 text-center stat-card" onclick="openJobsModal('${status}')">
                                <h5 class="text-secondary text-uppercase">${status}</h5>
                                <div class="stat-number">${count}</div>
                                <small class="text-muted mt-2">Apasă pentru detalii</small>
                            </div>
                        </div>
                    `;
                }
            })
            .catch(error => console.error('Eroare la statistici:', error));

        // 2. Luăm Companiile
        fetch('/api/companies')
            .then(response => response.json())
            .then(companies => {
                const companiesContainer = document.getElementById('companies-container');
                if (companies.length === 0) {
                    companiesContainer.innerHTML = '<p class="text-muted">Nu ai adăugat încă nicio companie.</p>';
                    return;
                }
                companies.forEach(company => {
                    companiesContainer.innerHTML += `
                        <div class="col-md-4 mb-3">
                            <div class="card p-3 h-100">
                                <h4>${company.name}</h4>
                                <p class="text-muted mb-1">📍 ${company.location}</p>
                                <p class="text-muted text-sm mb-3">Adăugat pe: ${company.createdAt}</p>
                                <a href="${company.website}" target="_blank" class="btn btn-outline-primary mt-auto">Vizitează Website</a>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(error => console.error('Eroare la companii:', error));
    }

    loadDashboardData();

    // 3. Afișare Joburi, Notițe și CV-uri
    function openJobsModal(status) {
        document.getElementById('jobsModalLabel').innerText = `Joburi cu statusul: ${status}`;
        const modalBody = document.getElementById('jobsModalBody');
        modalBody.innerHTML = `<div class="text-center"><div class="spinner-border text-primary" role="status"></div></div>`;

        const modalElement = document.getElementById('jobsModal');
        const jobsModal = new bootstrap.Modal(modalElement);
        jobsModal.show();

        fetch(`/api/jobs/filter?status=${status}`)
            .then(response => response.json())
            .then(jobs => {
                if (jobs.length === 0) {
                    modalBody.innerHTML = '<p class="text-muted text-center mt-3">Nu s-au găsit joburi.</p>';
                    return;
                }
                let htmlList = '<ul class="list-group list-group-flush">';
                jobs.forEach(job => {
                    const urlBtn = job.jobDescriptionUrl
                        ? `<a href="${job.jobDescriptionUrl}" target="_blank" class="btn btn-sm btn-link p-0 text-decoration-none">🌐 Vezi Descrierea</a>`
                        : '';

                    // Verificăm dacă există deja un CV salvat în baza de date
                    const cvSection = job.cvFileName
                        ? `
                            <div class="mt-2 text-muted d-flex align-items-center" style="font-size: 0.85rem;">
                                📎 <span class="fw-semibold text-truncate ms-1" style="max-width: 250px;">${job.cvFileName}</span>
                                <a href="/api/jobs/${job.id}/cv" class="btn btn-sm btn-link py-0 px-2 text-decoration-none">💾 Descarcă</a>
                                <button class="btn btn-sm btn-link py-0 px-1 text-danger text-decoration-none" onclick="deleteCV(${job.id})">❌ Șterge</button>
                            </div>
                          `
                        : `
                            <div class="mt-2" style="max-width: 320px;">
                                <div class="input-group input-group-sm">
                                    <input type="file" class="form-control" id="cv-input-${job.id}" accept=".pdf">
                                    <button class="btn btn-outline-success" onclick="uploadCV(${job.id})">⬆️ Încarcă CV</button>
                                </div>
                            </div>
                          `;

                    htmlList += `
                        <li class="list-group-item py-3">
                            <div class="d-flex w-100 justify-content-between align-items-center">
                                <h5 class="mb-1 text-primary fw-bold">${job.jobTitle}</h5>
                                <small class="text-muted">Aplicat pe: ${job.appliedAt}</small>
                            </div>
                            <p class="mb-1 fw-semibold">Companie: ${job.company.name}</p>

                            <!-- Secțiunea de fișier CV -->
                            ${cvSection}

                            <div class="d-flex justify-content-between align-items-center mt-3">
                                ${urlBtn}
                                <button class="btn btn-sm btn-outline-secondary" onclick="toggleNotes(${job.id})">📝 Notițe & Timeline</button>
                            </div>

                            <!-- Container ascuns pentru notițe -->
                            <div id="notes-container-${job.id}" class="mt-3 d-none p-3 bg-light rounded border">
                                <h6 class="fw-bold text-secondary mb-2" style="font-size: 0.9rem;">Timeline Notițe:</h6>
                                <div id="notes-list-${job.id}" class="mb-3"></div>
                                <div class="input-group">
                                    <input type="text" id="note-input-${job.id}" class="form-control form-control-sm" placeholder="Adaugă o notiță (ex: am programat interviul)...">
                                    <button class="btn btn-sm btn-primary" onclick="addNote(${job.id})">Adaugă</button>
                                </div>
                            </div>
                        </li>
                    `;
                });
                htmlList += '</ul>';
                modalBody.innerHTML = htmlList;
            })
            .catch(error => {
                modalBody.innerHTML = '<p class="text-danger">Eroare la încărcarea datelor.</p>';
            });
    }

    // ================= LOGICA PENTRU COMPRESIE & UPLOAD CV =================

    function uploadCV(jobId) {
        const fileInput = document.getElementById(`cv-input-${jobId}`);
        const file = fileInput.files[0];

        if (!file) {
            alert("Vă rugăm să alegeți un fișier PDF mai întâi!");
            return;
        }

        if (file.type !== "application/pdf") {
            alert("Aplicația acceptă doar fișiere în format PDF!");
            return;
        }

        const formData = new FormData();
        formData.append("file", file);

        fetch(`/api/jobs/${jobId}/cv`, {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (response.ok) {
                    alert("CV-ul a fost încărcat cu succes în baza de date!");
                    // Reîncărcăm modalul de joburi curent pentru a actualiza vizual UI-ul
                    const currentStatus = document.getElementById('jobsModalLabel').innerText.replace("Joburi cu statusul: ", "");
                    openJobsModal(currentStatus);
                } else {
                    alert("A apărut o eroare la încărcarea CV-ului!");
                }
            })
            .catch(err => console.error("Eroare la upload:", err));
    }

    function deleteCV(jobId) {
        if (!confirm("Sigur doriți să ștergeți CV-ul atașat acestui job?")) return;

        fetch(`/api/jobs/${jobId}/cv`, {
            method: 'DELETE'
        })
            .then(response => {
                if (response.ok) {
                    alert("CV-ul a fost șters!");
                    const currentStatus = document.getElementById('jobsModalLabel').innerText.replace("Joburi cu statusul: ", "");
                    openJobsModal(currentStatus);
                } else {
                    alert("Eroare la ștergerea CV-ului!");
                }
            })
            .catch(err => console.error("Eroare la ștergere:", err));
    }

    // ================= LOGICA PENTRU TIMELINE NOTIȚE =================

    function toggleNotes(jobId) {
        const container = document.getElementById(`notes-container-${jobId}`);
        if (container.classList.contains('d-none')) {
            container.classList.remove('d-none');
            loadNotes(jobId);
        } else {
            container.classList.add('d-none');
        }
    }

    function loadNotes(jobId) {
        const notesList = document.getElementById(`notes-list-${jobId}`);
        notesList.innerHTML = '<p class="text-muted small">Se încarcă notițele...</p>';

        fetch(`/api/jobs/${jobId}/notes`)
            .then(response => response.json())
            .then(notes => {
                if (notes.length === 0) {
                    notesList.innerHTML = '<p class="text-muted small">Nu există notițe. Adaugă una mai jos!</p>';
                    return;
                }
                notesList.innerHTML = '';
                notes.forEach(note => {
                    const dateStr = new Date(note.createdAt).toLocaleString('ro-RO', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    notesList.innerHTML += `
                        <div class="mb-2 p-2 bg-white rounded border shadow-sm" style="font-size: 0.85rem;">
                            <div class="d-flex justify-content-between text-muted mb-1" style="font-size: 0.75rem;">
                                <span>📌 Actualizare</span>
                                <span>${dateStr}</span>
                            </div>
                            <div>${note.content}</div>
                        </div>
                    `;
                });
            })
            .catch(error => {
                notesList.innerHTML = '<p class="text-danger small">Eroare la încărcare.</p>';
            });
    }

    function addNote(jobId) {
        const input = document.getElementById(`note-input-${jobId}`);
        const text = input.value.trim();
        if (!text) return;

        fetch(`/api/jobs/${jobId}/notes`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: text })
        })
            .then(response => {
                if (response.ok) {
                    input.value = '';
                    loadNotes(jobId);
                } else {
                    alert("Eroare la salvare!");
                }
            });
    }

    // ================= FORMULARE ADĂUGARE COMPANIE / JOB =================

    document.getElementById('addCompanyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            name: document.getElementById('companyName').value,
            location: document.getElementById('companyLocation').value,
            website: document.getElementById('companyWebsite').value
        };

        fetch('/api/companies', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if (response.ok) {
                    const modalEl = document.getElementById('addCompanyModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    modal.hide();
                    document.getElementById('addCompanyForm').reset();
                    loadDashboardData();
                } else {
                    alert("Eroare!");
                }
            });
    });

    function populateCompanyDropdown() {
        const selectElement = document.getElementById('jobCompanySelect');
        selectElement.innerHTML = '<option value="">Se încarcă companiile...</option>';

        fetch('/api/companies')
            .then(response => response.json())
            .then(companies => {
                if (companies.length === 0) {
                    selectElement.innerHTML = '<option value="">Adaugă mai întâi o companie!</option>';
                    return;
                }
                selectElement.innerHTML = '';
                companies.forEach(company => {
                    selectElement.innerHTML += `<option value="${company.id}">${company.name}</option>`;
                });
            });
    }

    document.getElementById('addJobForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const payload = {
            jobTitle: document.getElementById('jobTitle').value,
            status: document.getElementById('jobStatus').value,
            jobDescriptionUrl: document.getElementById('jobUrl').value,
            companyId: parseInt(document.getElementById('jobCompanySelect').value)
        };

        fetch('/api/jobs', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if (response.ok) {
                    const modalEl = document.getElementById('addJobModal');
                    const modal = bootstrap.Modal.getInstance(modalEl);
                    modal.hide();
                    document.getElementById('addJobForm').reset();
                    loadDashboardData();
                } else {
                    alert("Eroare!");
                }
            });
    });
</script>

</body>
</html>
