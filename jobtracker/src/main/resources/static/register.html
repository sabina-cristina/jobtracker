<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Înregistrare - Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .register-container { max-width: 400px; margin-top: 10%; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card p-4 shadow register-container w-100">
        <h3 class="text-center text-primary fw-bold mb-4">📝 Cont Nou</h3>
        <div id="error-msg" class="alert alert-danger d-none"></div>
        <div id="success-msg" class="alert alert-success d-none">Cont creat cu succes! Te redirecționăm...</div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="email" class="form-label">Adresă Email</label>
                <input type="email" class="form-control" id="email" required placeholder="nume@exemplu.com">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Parolă</label>
                <input type="password" class="form-control" id="password" required placeholder="Minim 6 caractere">
            </div>
            <button type="submit" class="btn btn-primary w-100">Creează Contul</button>
        </form>

        <div class="text-center mt-3">
            <span class="text-muted">Ai deja un cont?</span> <a href="/login.html" class="text-decoration-none">Loghează-te aici</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        errorMsg.classList.add('d-none');

        fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: password })
        })
            .then(async response => {
                if (response.ok) {
                    successMsg.classList.remove('d-none');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    const text = await response.text();
                    errorMsg.innerText = text || "Eroare la înregistrare!";
                    errorMsg.classList.remove('d-none');
                }
            })
            .catch(err => {
                errorMsg.innerText = "Eroare de conexiune la server.";
                errorMsg.classList.remove('d-none');
            });
    });
</script>
</body>
</html>
